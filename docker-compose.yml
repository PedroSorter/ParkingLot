services:
  postgres:
    image: postgres:16
    container_name: parkinglot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: parkinglot
    ports:
      - "5432:5432"
    volumes:
      - parkinglot-postgres-data:/var/lib/postgresql/data
      - ./database/docker-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  parkinglot-postgres-data:
